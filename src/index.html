<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'none'; style-src 'unsafe-inline'; script-src 'unsafe-inline';" />
    <title>Claude Agents</title>
    <style>
      :root {
        /* Kept as raw channels so one hue can be reused at several alphas —
           rgba() cannot take a var() colour. */
        --line-rgb: 148, 176, 219;
        --accent-rgb: 232, 149, 111;

        --bg: rgba(38, 52, 77, 0.94);
        --bg-header: rgba(51, 68, 97, 0.6);
        --border: rgba(var(--line-rgb), 0.18);
        --rule: rgba(var(--line-rgb), 0.1);
        --scrollbar: rgba(var(--line-rgb), 0.25);
        --hover: rgba(191, 214, 245, 0.1);
        --text: #eef3fa;
        --muted: #b3c4dc;
        --faint: #8199b8;
        --accent: rgb(var(--accent-rgb));
        --accent-wash: rgba(var(--accent-rgb), 0.18);
        --accent-soft: #f0b294;
      }

      * { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        background: transparent;
        font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif;
        color: var(--text);
        user-select: none;
        overflow: hidden;
      }

      #card {
        background: var(--bg);
        border: 1px solid var(--border);
        border-radius: 12px;
        backdrop-filter: blur(12px);
        overflow: hidden;
      }

      header {
        -webkit-app-region: drag;
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 9px 10px 9px 12px;
        background: var(--bg-header);
        border-bottom: 1px solid var(--border);
      }

      #dot {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: var(--faint);
        flex: none;
      }
      #dot.active {
        background: var(--accent);
        animation: pulse 1.6s ease-in-out infinite;
      }
      @keyframes pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.35; }
      }

      #title {
        font-size: 12px;
        font-weight: 600;
        letter-spacing: 0.01em;
        flex: 1;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      /* The count moves here so the header can carry the app name without
         losing the one number the window exists to show. */
      #count {
        font-size: 10.5px;
        font-weight: 600;
        color: var(--muted);
        font-variant-numeric: tabular-nums;
        white-space: nowrap;
        flex: none;
      }

      #close {
        -webkit-app-region: no-drag;
        background: none;
        border: none;
        color: var(--faint);
        font-size: 15px;
        line-height: 1;
        cursor: pointer;
        padding: 2px 4px;
        border-radius: 4px;
      }
      #close:hover { color: var(--text); background: var(--hover); }

      #list { max-height: 320px; overflow-y: auto; }
      #list::-webkit-scrollbar { width: 6px; }
      #list::-webkit-scrollbar-thumb {
        background: var(--scrollbar);
        border-radius: 3px;
      }

      .agent {
        display: flex;
        gap: 9px;
        padding: 9px 12px;
        border-bottom: 1px solid var(--rule);
      }
      .agent:last-child { border-bottom: none; }

      .bar {
        width: 2px;
        border-radius: 1px;
        background: var(--accent);
        opacity: 0.75;
        flex: none;
      }

      .body { min-width: 0; flex: 1; }

      .desc {
        font-size: 12px;
        line-height: 1.35;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .meta {
        display: flex;
        align-items: center;
        gap: 6px;
        margin-top: 3px;
        font-size: 10.5px;
        color: var(--muted);
      }

      .type {
        background: var(--accent-wash);
        color: var(--accent-soft);
        padding: 1px 5px;
        border-radius: 4px;
        font-weight: 600;
        white-space: nowrap;
      }

      .project {
        color: var(--faint);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .elapsed {
        margin-left: auto;
        color: var(--faint);
        font-variant-numeric: tabular-nums;
        white-space: nowrap;
      }

      #empty {
        padding: 14px 12px;
        font-size: 11.5px;
        color: var(--faint);
        text-align: center;
      }

      #setup {
        padding: 13px 14px 14px;
        text-align: center;
      }
      #setup p {
        font-size: 11.5px;
        line-height: 1.45;
        color: var(--muted);
        margin-bottom: 10px;
      }
      #connect {
        -webkit-app-region: no-drag;
        background: var(--accent-wash);
        border: 1px solid rgba(var(--accent-rgb), 0.4);
        color: var(--accent-soft);
        font: inherit;
        font-size: 11.5px;
        font-weight: 600;
        padding: 5px 12px;
        border-radius: 6px;
        cursor: pointer;
      }
      #connect:hover { background: rgba(var(--accent-rgb), 0.28); }
      #hint {
        margin-top: 9px;
        font-size: 10.5px;
        color: var(--faint);
      }
    </style>
  </head>
  <body>
    <div id="card">
      <header>
        <span id="dot"></span>
        <span id="title">Claude Agent Monitor</span>
        <span id="count">idle</span>
        <button id="close" title="Quit">&times;</button>
      </header>
      <div id="list"></div>
      <div id="empty">Waiting for Claude subagents…</div>
      <div id="setup" hidden>
        <p>Not connected to Claude Code yet.</p>
        <button id="connect">Connect</button>
        <div id="hint">Adds subagent hooks to your Claude Code settings.</div>
      </div>
    </div>

    <script>
      const listEl = document.getElementById('list');
      const emptyEl = document.getElementById('empty');
      const setupEl = document.getElementById('setup');
      const hintEl = document.getElementById('hint');
      const countEl = document.getElementById('count');
      const dotEl = document.getElementById('dot');
      const cardEl = document.getElementById('card');

      let agents = [];
      let connected = true; // Assume yes until told otherwise, so the panel never flashes.
      let justConnected = false;
      let lastHeight = 0;

      function elapsed(startedAt) {
        const secs = Math.max(0, Math.round((Date.now() - startedAt) / 1000));
        if (secs < 60) return secs + 's';
        const mins = Math.floor(secs / 60);
        if (mins < 60) return mins + 'm ' + (secs % 60) + 's';
        return Math.floor(mins / 60) + 'h ' + (mins % 60) + 'm';
      }

      function render() {
        const n = agents.length;
        countEl.textContent = !connected ? 'setup' : n === 0 ? 'idle' : n + (n === 1 ? ' agent' : ' agents');
        dotEl.classList.toggle('active', n > 0);
        setupEl.hidden = connected && !justConnected;
        emptyEl.style.display = connected && !justConnected && n === 0 ? 'block' : 'none';

        listEl.replaceChildren(
          ...agents.map((a) => {
            const row = document.createElement('div');
            row.className = 'agent';

            const bar = document.createElement('div');
            bar.className = 'bar';

            const body = document.createElement('div');
            body.className = 'body';

            const desc = document.createElement('div');
            desc.className = 'desc';
            desc.textContent = a.description;
            desc.title = a.description;

            const meta = document.createElement('div');
            meta.className = 'meta';

            const type = document.createElement('span');
            type.className = 'type';
            type.textContent = a.type;

            const project = document.createElement('span');
            project.className = 'project';
            project.textContent = a.project || '';

            const time = document.createElement('span');
            time.className = 'elapsed';
            time.textContent = elapsed(a.startedAt);

            meta.append(type, project, time);
            body.append(desc, meta);
            row.append(bar, body);
            return row;
          })
        );

        // Only when it actually changes: this runs every second, and each resize
        // is an IPC round trip plus a real compositor operation.
        const height = cardEl.getBoundingClientRect().height;
        if (height !== lastHeight) {
          lastHeight = height;
          window.monitor.resize(height);
        }
      }

      window.monitor.onAgents((next) => {
        agents = next;
        render();
      });

      window.monitor.onConnected((ok) => {
        // Claude Code only rereads its hook config on /hooks or a restart, so
        // hold the panel open long enough to say so — otherwise it vanishes and
        // the user is left watching a window that stays empty.
        if (ok && !connected) {
          document.getElementById('setup').querySelector('p').textContent = 'Connected.';
          document.getElementById('connect').hidden = true;
          hintEl.textContent = 'Restart Claude Code, or run /hooks, to pick it up.';
          justConnected = true;
          setTimeout(() => {
            justConnected = false;
            render();
          }, 8000);
        }
        connected = ok;
        render();
      });

      document.getElementById('connect').addEventListener('click', () => window.monitor.connect());
      document.getElementById('close').addEventListener('click', () => window.monitor.quit());

      // Keep the elapsed counters ticking between pushes from the main process.
      setInterval(render, 1000);

      window.monitor.ready();
      render();
    </script>
  </body>
</html>
