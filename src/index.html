<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'none'; style-src 'unsafe-inline'; script-src 'unsafe-inline';" />
    <title>Claude Activity Monitor</title>
    <style>
      :root {
        /* Kept as raw channels so one hue can be reused at several alphas —
           rgba() cannot take a var() colour. */
        --line-rgb: 148, 176, 219;
        --accent-rgb: 232, 149, 111;
        /* Awaiting feedback: an amber that reads as "your move", distinct from
           the orange the tool uses for active work. */
        --wait-rgb: 240, 199, 122;
        /* Needs permission: a warmer alert tone for the one state you must act on. */
        --alert-rgb: 233, 132, 132;

        --bg: rgba(38, 52, 77, 0.94);
        --bg-header: rgba(51, 68, 97, 0.6);
        --border: rgba(var(--line-rgb), 0.18);
        --scrollbar: rgba(var(--line-rgb), 0.25);
        --hover: rgba(191, 214, 245, 0.1);
        --text: #eef3fa;
        --muted: #b3c4dc;
        --faint: #8199b8;
        --accent: rgb(var(--accent-rgb));
        --accent-wash: rgba(var(--accent-rgb), 0.18);
        --accent-soft: #f0b294;
        --wait: rgb(var(--wait-rgb));
        --alert: rgb(var(--alert-rgb));
      }

      * { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        background: transparent;
        font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif;
        color: var(--text);
        user-select: none;
        overflow: hidden;
      }

      #card {
        background: var(--bg);
        border: 1px solid var(--border);
        border-radius: 12px;
        backdrop-filter: blur(12px);
        overflow: hidden;
      }

      header {
        -webkit-app-region: drag;
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 9px 10px 9px 12px;
        background: var(--bg-header);
        border-bottom: 1px solid var(--border);
      }

      #dot {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: var(--faint);
        flex: none;
      }
      #dot.active {
        background: var(--accent);
        animation: pulse 1.6s ease-in-out infinite;
      }
      #dot.waiting { background: var(--wait); animation: none; }
      @keyframes pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.35; }
      }

      #title {
        font-size: 12px;
        font-weight: 600;
        letter-spacing: 0.01em;
        flex: 1;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      /* The count moves here so the header can carry the app name without
         losing the one number the window exists to show. */
      #count {
        font-size: 10.5px;
        font-weight: 600;
        color: var(--muted);
        font-variant-numeric: tabular-nums;
        white-space: nowrap;
        flex: none;
      }

      #close {
        -webkit-app-region: no-drag;
        background: none;
        border: none;
        color: var(--faint);
        font-size: 15px;
        line-height: 1;
        cursor: pointer;
        padding: 2px 4px;
        border-radius: 4px;
      }
      #close:hover { color: var(--text); background: var(--hover); }

      #list { max-height: 460px; overflow-y: auto; }
      #list::-webkit-scrollbar { width: 6px; }
      #list::-webkit-scrollbar-thumb {
        background: var(--scrollbar);
        border-radius: 3px;
      }

      /* One section per Claude Code chat window: a heading, then its agents. */
      .session {
        border-bottom: 1px solid var(--border);
        padding-bottom: 6px;
      }
      .session:last-child { border-bottom: none; }

      .session-head {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 9px 12px 5px;
      }
      .state-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        flex: none;
        background: var(--faint);
      }
      .state-dot.working {
        background: var(--accent);
        animation: pulse 1.6s ease-in-out infinite;
      }
      .state-dot.waiting { background: var(--wait); }
      .state-dot.permission { background: var(--alert); }

      .session-project {
        font-size: 12px;
        font-weight: 700;
        color: var(--text);
        flex: 1;
        min-width: 0;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .session-status {
        font-size: 10.5px;
        color: var(--faint);
        font-variant-numeric: tabular-nums;
        white-space: nowrap;
        flex: none;
      }
      .session-status.waiting { color: var(--wait); font-weight: 600; }
      .session-status.permission { color: var(--alert); font-weight: 600; }

      /* The live tool line and the subagents share one indent, so they read as a
         single list hanging off the window heading above them. */
      .session-activity {
        padding: 1px 12px 2px 24px;
        font-size: 10.5px;
        color: var(--faint);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .session-activity .tool { color: var(--accent-soft); font-weight: 600; }

      .agent {
        display: flex;
        align-items: baseline;
        gap: 8px;
        padding: 3px 12px 3px 24px;
      }
      .agent .desc {
        font-size: 11.5px;
        color: var(--muted);
        flex: 1;
        min-width: 0;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .agent .elapsed {
        font-size: 10.5px;
        color: var(--faint);
        font-variant-numeric: tabular-nums;
        white-space: nowrap;
        flex: none;
      }

      #empty {
        padding: 14px 12px;
        font-size: 11.5px;
        color: var(--faint);
        text-align: center;
      }

      #setup {
        padding: 13px 14px 14px;
        text-align: center;
      }
      #setup p {
        font-size: 11.5px;
        line-height: 1.45;
        color: var(--muted);
        margin-bottom: 10px;
      }
      #connect {
        -webkit-app-region: no-drag;
        background: var(--accent-wash);
        border: 1px solid rgba(var(--accent-rgb), 0.4);
        color: var(--accent-soft);
        font: inherit;
        font-size: 11.5px;
        font-weight: 600;
        padding: 5px 12px;
        border-radius: 6px;
        cursor: pointer;
      }
      #connect:hover { background: rgba(var(--accent-rgb), 0.28); }
      #hint {
        margin-top: 9px;
        font-size: 10.5px;
        color: var(--faint);
      }
    </style>
  </head>
  <body>
    <div id="card">
      <header>
        <span id="dot"></span>
        <span id="title">Claude Activity Monitor</span>
        <span id="count">idle</span>
        <button id="close" title="Quit">&times;</button>
      </header>
      <div id="list"></div>
      <div id="empty">Waiting for Claude sessions…</div>
      <div id="setup" hidden>
        <p>Not connected to Claude Code yet.</p>
        <button id="connect">Connect</button>
        <div id="hint">Adds session &amp; subagent hooks to your Claude Code settings.</div>
      </div>
    </div>

    <script>
      const listEl = document.getElementById('list');
      const emptyEl = document.getElementById('empty');
      const setupEl = document.getElementById('setup');
      const hintEl = document.getElementById('hint');
      const countEl = document.getElementById('count');
      const dotEl = document.getElementById('dot');
      const cardEl = document.getElementById('card');

      let sessions = [];
      let connected = true; // Assume yes until told otherwise, so the panel never flashes.
      let justConnected = false;
      let lastHeight = 0;

      function elapsed(startedAt) {
        const secs = Math.max(0, Math.round((Date.now() - startedAt) / 1000));
        if (secs < 60) return secs + 's';
        const mins = Math.floor(secs / 60);
        if (mins < 60) return mins + 'm ' + (secs % 60) + 's';
        return Math.floor(mins / 60) + 'h ' + (mins % 60) + 'm';
      }

      // What a waiting session is waiting on, worded for the person who has to act.
      const WAITING_LABEL = {
        permission: 'needs permission',
        idle: 'waiting for you',
        turn: 'waiting for you',
        ended: 'ended',
        new: 'ready',
      };

      function agentRow(a) {
        const row = document.createElement('div');
        row.className = 'agent';

        const desc = document.createElement('span');
        desc.className = 'desc';
        desc.textContent = a.description;
        // Type is off the row now to keep it clean, but kept a hover away.
        desc.title = a.description + '  ·  ' + a.type;

        const time = document.createElement('span');
        time.className = 'elapsed';
        time.textContent = elapsed(a.startedAt);

        row.append(desc, time);
        return row;
      }

      function sessionSection(s) {
        const section = document.createElement('div');
        section.className = 'session';

        const head = document.createElement('div');
        head.className = 'session-head';

        const permission = s.state !== 'working' && s.waiting === 'permission';
        const tone = s.state === 'working' ? 'working' : permission ? 'permission' : 'waiting';

        const dot = document.createElement('span');
        dot.className = 'state-dot ' + tone;

        const project = document.createElement('span');
        project.className = 'session-project';
        project.textContent = s.project || s.title || 'Claude session';
        project.title = s.cwd || project.textContent;

        const status = document.createElement('span');
        if (s.state === 'working') {
          status.className = 'session-status';
          status.textContent = elapsed(s.startedAt);
        } else {
          status.className = 'session-status ' + tone;
          status.textContent = WAITING_LABEL[s.waiting] || 'waiting for you';
        }

        head.append(dot, project, status);
        section.append(head);

        // The live tool line, only while there is one to show.
        if (s.state === 'working' && (s.activity || s.agents.length === 0)) {
          const act = document.createElement('div');
          act.className = 'session-activity';
          if (s.activity) {
            const tool = document.createElement('span');
            tool.className = 'tool';
            tool.textContent = s.activity.tool;
            act.append(document.createTextNode('running · '), tool);
            if (s.activity.detail) {
              act.append(document.createTextNode(' ' + s.activity.detail));
              act.title = s.activity.tool + ' · ' + s.activity.detail;
            }
          } else {
            act.textContent = 'working…';
          }
          section.append(act);
        }

        for (const a of s.agents) section.append(agentRow(a));
        return section;
      }

      function render() {
        const n = sessions.length;
        const working = sessions.filter((s) => s.state === 'working').length;
        const waiting = n - working;

        const parts = [];
        if (working) parts.push(working + ' active');
        if (waiting) parts.push(waiting + ' waiting');
        countEl.textContent = !connected ? 'setup' : n === 0 ? 'idle' : parts.join(' · ');

        dotEl.classList.toggle('active', working > 0);
        dotEl.classList.toggle('waiting', working === 0 && waiting > 0);
        setupEl.hidden = connected && !justConnected;
        emptyEl.style.display = connected && !justConnected && n === 0 ? 'block' : 'none';

        listEl.replaceChildren(...sessions.map(sessionSection));

        // Only when it actually changes: this runs every second, and each resize
        // is an IPC round trip plus a real compositor operation.
        const height = cardEl.getBoundingClientRect().height;
        if (height !== lastHeight) {
          lastHeight = height;
          window.monitor.resize(height);
        }
      }

      window.monitor.onSessions((next) => {
        sessions = Array.isArray(next) ? next : [];
        render();
      });

      window.monitor.onConnected((ok) => {
        // Claude Code only rereads its hook config on /hooks or a restart, so
        // hold the panel open long enough to say so — otherwise it vanishes and
        // the user is left watching a window that stays empty.
        if (ok && !connected) {
          document.getElementById('setup').querySelector('p').textContent = 'Connected.';
          document.getElementById('connect').hidden = true;
          hintEl.textContent = 'Restart Claude Code, or run /hooks, to pick it up.';
          justConnected = true;
          setTimeout(() => {
            justConnected = false;
            render();
          }, 8000);
        }
        connected = ok;
        render();
      });

      document.getElementById('connect').addEventListener('click', () => window.monitor.connect());
      document.getElementById('close').addEventListener('click', () => window.monitor.quit());

      // Keep the elapsed counters ticking between pushes from the main process.
      setInterval(render, 1000);

      window.monitor.ready();
      render();
    </script>
  </body>
</html>
